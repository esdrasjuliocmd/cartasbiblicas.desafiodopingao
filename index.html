<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quem Sou Eu? - Bíblico</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #667eea;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        /* PÓDIO TOP 3 */
        .podio-section {
            background: linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(253, 203, 110, 0.3);
        }

        .podio-title {
            text-align: center;
            font-size: 1.8rem;
            color: #2d3436;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .podio {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            margin-top: 20px;
        }

        .podio-item {
            text-align: center;
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
            position: relative;
        }

        .podio-item:hover {
            transform: translateY(-10px);
        }

        .podio-item.primeiro {
            order: 2;
            flex: 1;
            max-width: 200px;
            animation: float 3s ease-in-out infinite;
        }

        .podio-item.segundo {
            order: 1;
            flex: 0.9;
            max-width: 180px;
            animation: float 3s ease-in-out 0.3s infinite;
        }

        .podio-item.terceiro {
            order: 3;
            flex: 0.8;
            max-width: 160px;
            animation: float 3s ease-in-out 0.6s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .medalha {
            font-size: 4rem;
            margin-bottom: 10px;
            display: block;
        }

        .posicao {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
        }

        .primeiro .posicao {
            background: linear-gradient(135deg, #FFD700, #FFA500);
        }

        .segundo .posicao {
            background: linear-gradient(135deg, #C0C0C0, #808080);
        }

        .terceiro .posicao {
            background: linear-gradient(135deg, #CD7F32, #8B4513);
        }

        .jogador-nome {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2d3436;
            margin-bottom: 5px;
        }

        .jogador-pontos {
            font-size: 1rem;
            color: #667eea;
            font-weight: bold;
        }

        .podio-vazio {
            text-align: center;
            color: #2d3436;
            font-size: 1.1rem;
            padding: 20px;
        }

        /* BOTÕES PRINCIPAIS */
        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .menu-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .menu-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.6);
        }

        .menu-btn:active {
            transform: translateY(-2px);
        }

        .btn-solo {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .btn-amigos {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-ranking {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        /* ESTATÍSTICAS */
        .stats {
            display: flex;
            justify-content: space-around;
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        /* RESPONSIVO */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .podio {
                flex-direction: column;
                align-items: center;
            }

            .podio-item.primeiro,
            .podio-item.segundo,
            .podio-item.terceiro {
                order: unset;
                max-width: 100%;
                width: 100%;
            }

            .menu-btn {
                font-size: 1.1rem;
                padding: 15px;
            }

            .stats {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Quem Sou Eu?</h1>
        <p class="subtitle">Desafio Bíblico</p>

        <!-- PÓDIO TOP 3 -->
        <div class="podio-section">
            <div class="podio-title">🏆 Pódio dos Campeões</div>
            <div id="podio-container">
                <div class="podio-vazio">Carregando ranking...</div>
            </div>
        </div>

        <!-- MENU PRINCIPAL -->
        <div class="menu-buttons">
            <button class="menu-btn btn-solo" onclick="window.location.href='solo.html'">
                🎮 JOGAR SOZINHO
            </button>
            <button class="menu-btn btn-amigos" onclick="window.location.href='multiplayer-competitivo.html'">
                👥 JOGUE COM AMIGOS
            </button>
            <button class="menu-btn btn-ranking" onclick="window.location.href='recompensas.html'">
                🏅 RANKING GLOBAL
            </button>
        </div>

        <!-- ESTATÍSTICAS -->
        <div class="stats">
            <div class="stat-item">
                <div class="stat-number">500</div>
                <div class="stat-label">Cartas</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">5</div>
                <div class="stat-label">Categorias</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="jogadores-online">...</div>
                <div class="stat-label">Jogadores</div>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'https://quem-sou-eu-backend-v4.esdrasjulio.workers.dev';

        // Carregar pódio
        async function carregarPodio() {
            try {
                const response = await fetch(`${BACKEND_URL}/ranking`);
                const data = await response.json();
                
                if (data.ranking && data.ranking.length > 0) {
                    const top3 = data.ranking.slice(0, 3);
                    
                    let html = '<div class="podio">';
                    
                    const medalhas = ['🥇', '🥈', '🥉'];
                    const classes = ['primeiro', 'segundo', 'terceiro'];
                    
                    top3.forEach((jogador, index) => {
                        html += `
                            <div class="podio-item ${classes[index]}">
                                <div class="medalha">${medalhas[index]}</div>
                                <div class="posicao">${index + 1}</div>
                                <div class="jogador-nome">${jogador.nome}</div>
                                <div class="jogador-pontos">${jogador.pontos} pts</div>
                            </div>
                        `;
                    });
                    
                    html += '</div>';
                    document.getElementById('podio-container').innerHTML = html;
                } else {
                    document.getElementById('podio-container').innerHTML = 
                        '<div class="podio-vazio">🎯 Seja o primeiro a conquistar o pódio!</div>';
                }
            } catch (error) {
                console.error('Erro ao carregar pódio:', error);
                document.getElementById('podio-container').innerHTML = 
                    '<div class="podio-vazio">⚠️ Erro ao carregar ranking</div>';
            }
        }

        // Carregar estatísticas
        async function carregarEstatisticas() {
            try {
                const response = await fetch(`${BACKEND_URL}/ranking`);
                const data = await response.json();
                
                const totalJogadores = data.ranking ? data.ranking.length : 0;
                document.getElementById('jogadores-online').textContent = totalJogadores;
            } catch (error) {
                document.getElementById('jogadores-online').textContent = '?';
            }
        }

        // Carregar ao iniciar
        carregarPodio();
        carregarEstatisticas();

        // Atualizar a cada 1 minuto
        setInterval(() => {
            carregarPodio();
            carregarEstatisticas();
        }, 60000);
    </script>
</body>
</html>
