<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pontos do ranking (Durable Object)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 24px; max-width: 900px; margin: 0 auto; }
    h1 { margin-bottom: 8px; color: #1a1a1a; }
    .api-url {
      background: #f0f0f0;
      padding: 12px 16px;
      border-radius: 8px;
      margin: 16px 0;
      word-break: break-all;
      font-size: 0.95rem;
    }
    .api-url a { color: #0066cc; }
    .api-url a:hover { text-decoration: underline; }
    .info { color: #666; font-size: 0.9rem; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background: #f5f5f5; font-weight: 600; }
    .erro { color: #c00; padding: 16px; background: #ffebee; border-radius: 8px; margin-top: 16px; }
    .carregando { color: #666; padding: 16px; }
  </style>
</head>
<body>
  <h1>Pontos do ranking (Durable Object)</h1>
  <p class="info">Os pontos ficam no Durable Object <strong>PontosGlobaisDO</strong>, expostos pela rota <code>GET /ranking</code>.</p>

  <p class="info"><strong>Link direto para ver o JSON no navegador:</strong></p>
  <div class="api-url" id="api-url-box">
    <a href="" id="api-link" target="_blank" rel="noopener">Carregando...</a>
  </div>

  <h2 style="margin-top: 24px;">Listagem (esta página)</h2>
  <div id="conteudo" class="carregando">Carregando ranking...</div>

  <script src="config.js"></script>
  <script>
    const API_BASE = window.APP_CONFIG && window.APP_CONFIG.API_BASE
      ? window.APP_CONFIG.API_BASE.replace(/\/$/, '')
      : 'https://quem-sou-eu-backend-v4.esdrasjulio.workers.dev';
    const RANKING_URL = API_BASE + '/ranking';

    document.getElementById('api-link').href = RANKING_URL;
    document.getElementById('api-link').textContent = RANKING_URL;

    async function carregar() {
      const el = document.getElementById('conteudo');
      try {
        const res = await fetch(RANKING_URL);
        const data = await res.json();
        const ranking = Array.isArray(data && data.ranking) ? data.ranking : [];
        if (ranking.length === 0) {
          el.innerHTML = '<p class="info">Nenhum jogador no ranking.</p>';
          el.className = '';
          return;
        }
        let html = '<table><thead><tr><th>#</th><th>Nome</th><th>Pontos</th><th>Nível</th></tr></thead><tbody>';
        ranking.forEach((j, i) => {
          html += '<tr><td>' + (i + 1) + '</td><td>' + (j.nome || '-') + '</td><td>' + Number(j.pontos || 0).toLocaleString('pt-BR') + '</td><td>' + (j.nivel || '-') + '</td></tr>';
        });
        html += '</tbody></table>';
        el.innerHTML = html;
        el.className = '';
      } catch (e) {
        el.className = 'erro';
        el.innerHTML = 'Erro ao carregar: ' + e.message + '. <br><br>Use o <a href="' + RANKING_URL + '" target="_blank">link direto</a> para abrir o JSON.';
      }
    }
    carregar();
  </script>
</body>
</html>
