<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Competitivo</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Multiplayer Competitivo</h1>
    <button id="btn-som">Sound On</button>
    <div id="game-area">
        <!-- Game content goes here -->
    </div>

    <script>
        // Enable sound by default
        const soundEnabled = true;
        document.getElementById('btn-som').innerText = soundEnabled ? 'Sound On' : 'Sound Off';

        // Fun Sala B overlay animation
        function moveToSalaB() {
            const overlay = document.createElement('div');
            overlay.classList.add('overlay');
            document.body.appendChild(overlay);
            // Play funny WebAudio tune
            const audio = new Audio('funny-tune.mp3');
            audio.play();

            setTimeout(() => {
                overlay.remove();
            }, 3000);
        }

        // Existing spectator styles retained
    </script>
</body>
</html>
