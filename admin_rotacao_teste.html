<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin de Teste — Rotação de Cartas</title>
  <style>
    body{font-family:Arial,sans-serif;margin:0;background:#f3f5f8;color:#123;padding:20px}
    .wrap{max-width:1200px;margin:0 auto}
    .card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 8px 24px rgba(0,0,0,.08);margin-bottom:16px}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    input,button{padding:12px;border-radius:10px;border:1px solid #c8d2e1;font-size:16px}
    input{flex:1;min-width:220px}
    button{background:#2E5B93;color:#fff;border:none;cursor:pointer}
    button.secondary{background:#6b7280}
    .muted{color:#667085;font-size:14px}
    .partida{border:1px solid #dde3ec;border-radius:12px;padding:12px;margin-top:12px}
    .meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;margin:10px 0}
    .pill{display:inline-block;background:#eef4ff;border:1px solid #cdddfd;border-radius:999px;padding:4px 8px;margin:2px;font-family:monospace;font-size:12px}
    .repeated{background:#fff0f0;border-color:#f1b5b5;color:#9b1c1c}
    .ok{color:#156f3d;font-weight:bold}
    .warn{color:#8a5a00;font-weight:bold}
    details{margin-top:8px}
    code{font-family:Consolas,monospace}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>🔎 Admin de Teste — Rotação de Cartas</h1>
    <p class="muted">Veja as cartas jogadas por jogador e por partida para descobrir repetições.</p>
    <div class="row">
      <input id="token" placeholder="Token admin">
      <input id="nome" placeholder="Nome do jogador">
      <input id="limite" type="number" min="1" max="100" value="20" style="max-width:120px">
      <button id="buscar">Buscar</button>
      <button class="secondary" id="copiar">Copiar JSON</button>
    </div>
    <p class="muted">Endpoint usado: <code>/admin/cartas-jogador</code></p>
  </div>
  <div class="card" id="status">Informe token e jogador para consultar.</div>
  <div id="resultado"></div>
</div>
<script>
const API_BASE = "https://quem-sou-eu-backend-v4.esdrasjulio.workers.dev";
let ultimoJSON = null;

function fmtData(ts){
  const n = Number(ts||0);
  if(!n) return '-';
  return new Date(n).toLocaleString('pt-BR');
}
function esc(s){
  return String(s ?? '').replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
}
function setStatus(msg){
  document.getElementById('status').innerHTML = msg;
}
function render(resultado){
  ultimoJSON = resultado;
  const root = document.getElementById('resultado');
  const partidas = Array.isArray(resultado?.partidas) ? resultado.partidas : [];
  if(!partidas.length){
    root.innerHTML = '<div class="card">Nenhuma partida detalhada encontrada para esse jogador.</div>';
    return;
  }

  const repeticoes = resultado?.repeticoes || {};
  root.innerHTML = partidas.map((p, idx) => {
    const reps = repeticoes[p.partidaId] || [];
    const repeatedSet = new Set();
    reps.forEach(r => (r.cardKeys || []).forEach(k => repeatedSet.add(k)));
    const cartasHtml = (p.cartas || []).map(c => {
      const key = c.cardKey || '';
      const cls = repeatedSet.has(key) ? 'pill repeated' : 'pill';
      const exibir = c.cartaId ? `id:${c.cartaId}` : key;
      return `<span class="${cls}">F${c.faseNumero}·${c.ordemCarta} · ${esc(exibir)}</span>`;
    }).join('');
    const repsHtml = reps.length
      ? reps.map(r => `<div class="warn">Repete ${r.quantidade} cartas com a partida ${esc(r.contraPartidaId)}</div>`).join('')
      : '<div class="ok">Sem repetição detectada entre as partidas carregadas.</div>';

    return `
      <div class="card partida">
        <h3>Partida ${idx + 1} — ${esc(p.partidaId)}</h3>
        <div class="meta">
          <div><b>Data:</b> ${fmtData(p.data)}</div>
          <div><b>Categoria:</b> ${esc(p.categoria || '-')}</div>
          <div><b>Fase final:</b> ${Number(p.faseFinal || 0)}</div>
          <div><b>Total de cartas:</b> ${Number(p.totalCartas || 0)}</div>
          <div><b>Status:</b> ${p.parcial ? 'Parcial' : 'Completa'}</div>
        </div>
        ${repsHtml}
        <details open>
          <summary><b>IDs/Keys das cartas jogadas</b></summary>
          <div style="margin-top:8px">${cartasHtml || '<span class="muted">Sem cartas</span>'}</div>
        </details>
      </div>
    `;
  }).join('');
}

document.getElementById('buscar').addEventListener('click', async () => {
  const token = document.getElementById('token').value.trim();
  const nome = document.getElementById('nome').value.trim();
  const limite = document.getElementById('limite').value || '20';
  if(!token || !nome){
    setStatus('Preencha o token admin e o nome do jogador.');
    return;
  }
  setStatus('Consultando...');
  try{
    const url = `${API_BASE}/admin/cartas-jogador?nome=${encodeURIComponent(nome)}&limite=${encodeURIComponent(limite)}`;
    const res = await fetch(url, { headers: { 'X-Admin-Token': token }});
    const txt = await res.text();
    let data = {};
    try { data = JSON.parse(txt); } catch { throw new Error(txt || `HTTP ${res.status}`); }
    if(!res.ok) throw new Error(data?.erro || `HTTP ${res.status}`);
    setStatus(`Consulta concluída para <b>${esc(data?.jogador || nome)}</b>.`);
    render(data);
  } catch(err){
    setStatus(`Erro: ${esc(err.message || err)}`);
    document.getElementById('resultado').innerHTML = '';
  }
});

document.getElementById('copiar').addEventListener('click', async () => {
  if(!ultimoJSON){
    setStatus('Nada para copiar ainda.');
    return;
  }
  try{
    await navigator.clipboard.writeText(JSON.stringify(ultimoJSON, null, 2));
    setStatus('JSON copiado para a área de transferência.');
  } catch {
    setStatus('Não foi possível copiar automaticamente. Veja no console.');
    console.log(ultimoJSON);
  }
});
</script>
</body>
</html>
