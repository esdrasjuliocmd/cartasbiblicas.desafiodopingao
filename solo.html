<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solo - Cartas Bíblicas</title>
  <style>
    body { font-family: Arial, sans-serif; background:#0f172a; color:#fff; margin:0; }
    .wrap { max-width:900px; margin:0 auto; padding:20px; }
    .card { background:#111827; border:1px solid #374151; border-radius:12px; padding:16px; margin-bottom:12px; }
    .row { display:flex; gap:10px; flex-wrap:wrap; }
    .pill { background:#1f2937; border:1px solid #374151; border-radius:999px; padding:6px 10px; font-size:12px; }
    .q { font-size:22px; margin:8px 0 14px; }
    .opts { display:grid; grid-template-columns:1fr; gap:10px; }
    .opt { width:100%; text-align:left; padding:12px; border-radius:10px; border:1px solid #4b5563; background:#1f2937; color:#fff; cursor:pointer; }
    .opt:hover { background:#374151; }
    .ok { color:#22c55e; font-weight:bold; }
    .err { color:#ef4444; font-weight:bold; }
    .muted { opacity:.85; font-size:14px; }
    .actions { margin-top:12px; display:flex; gap:8px; }
    button { padding:10px 14px; border:0; border-radius:8px; cursor:pointer; }
    .primary { background:#2563eb; color:#fff; }
    .ghost { background:#334155; color:#fff; }
  </style>
</head>
<body>
<div class="wrap">
  <h1>🎯 Solo - Cartas Bíblicas</h1>

  <div class="card">
    <div class="row">
      <div class="pill">Fase <span id="faseTxt">1/10</span></div>
      <div class="pill">Pontos <span id="pontosTxt">0</span></div>
      <div class="pill">Dificuldade <span id="difTxt">5</span>/10</div>
      <div class="pill">Acertos <span id="acertosTxt">0</span></div>
      <div class="pill">Erros <span id="errosTxt">0</span></div>
    </div>
  </div>

  <div class="card">
    <div class="muted">Dica 1: <span id="d1">-</span></div>
    <div class="muted">Dica 2: <span id="d2">-</span></div>
    <div class="muted">Dica 3: <span id="d3">-</span></div>
    <div class="q">Quem sou eu?</div>
    <div class="opts" id="opts"></div>
    <div id="fb" style="margin-top:10px;"></div>
    <div class="actions">
      <button class="ghost" id="proxBtn" disabled>Próxima</button>
      <button class="primary" id="reiniciarBtn">Reiniciar</button>
    </div>
  </div>
</div>

<script>
(() => {
  const API = "https://quem-sou-eu-backend-v4.esdrasjulio.workers.dev";
  const TOTAL_PERGUNTAS = 10;

  let cartas = [];
  let usadas = new Set();
  let perguntaAtual = 1;
  let pontos = 0;
  let acertos = 0;
  let erros = 0;
  let cartaAtual = null;
  let travado = false;

  const $ = (id) => document.getElementById(id);

  function normalizarTexto(s) {
    return String(s || "")
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .trim();
  }

  function embaralhar(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function obterDificuldadeCarta(c) {
    const v = Number(c?.dificuldade);
    if (Number.isFinite(v)) return Math.max(0, Math.min(10, Math.round(v)));
    return 5;
  }

  function detectarGeneroCarta(c) {
    if (!c) return "neutro";

    const g = normalizarTexto(c.genero || "");
    if (g === "masculino") return "masculino";
    if (g === "feminino") return "feminino";

    if (c.masculino === true || c.masculino === 1) return "masculino";
    if (c.feminino === true || c.feminino === 1) return "feminino";

    // heuristica leve por nome (fallback)
    const nome = normalizarTexto(c.resposta || "");
    if (nome.endsWith("a") && !nome.endsWith("ias") && !nome.endsWith("as")) return "feminino";
    if (nome.endsWith("o")) return "masculino";
    return "neutro";
  }

  function gerarOpcoesErradas(correta, qtd = 3) {
    const respostaCorreta = normalizarTexto(correta?.resposta || "");
    const generoCorreta = detectarGeneroCarta(correta);

    const candidatos = cartas.filter(c => normalizarTexto(c.resposta) !== respostaCorreta);

    let pool = candidatos;
    if (generoCorreta !== "neutro") {
      const coerentes = candidatos.filter(c => detectarGeneroCarta(c) === generoCorreta);
      const neutros = candidatos.filter(c => detectarGeneroCarta(c) === "neutro");
      pool = coerentes.length >= qtd ? coerentes : [...coerentes, ...neutros];
      if (pool.length < qtd) pool = candidatos;
    }

    const out = [];
    const seen = new Set([respostaCorreta]);
    for (const c of embaralhar(pool)) {
      const r = String(c.resposta || "").trim();
      const k = normalizarTexto(r);
      if (!r || seen.has(k)) continue;
      seen.add(k);
      out.push(r);
      if (out.length === qtd) break;
    }

    // ultimo fallback
    if (out.length < qtd) {
      for (const c of embaralhar(candidatos)) {
        const r = String(c.resposta || "").trim();
        const k = normalizarTexto(r);
        if (!r || seen.has(k)) continue;
        seen.add(k);
        out.push(r);
        if (out.length === qtd) break;
      }
    }

    return out;
  }

  function atualizarHUD() {
    $("faseTxt").textContent = `${perguntaAtual}/${TOTAL_PERGUNTAS}`;
    $("pontosTxt").textContent = pontos;
    $("acertosTxt").textContent = acertos;
    $("errosTxt").textContent = erros;
    $("difTxt").textContent = obterDificuldadeCarta(cartaAtual);
  }

  function escolherCarta() {
    const disponiveis = cartas.filter(c => !usadas.has(normalizarTexto(c.resposta)));
    if (disponiveis.length === 0) {
      usadas.clear();
      return escolherCarta();
    }
    const c = disponiveis[Math.floor(Math.random() * disponiveis.length)];
    usadas.add(normalizarTexto(c.resposta));
    return c;
  }

  function renderPergunta() {
    travado = false;
    $("fb").textContent = "";
    $("proxBtn").disabled = true;

    cartaAtual = escolherCarta();
    $("d1").textContent = cartaAtual.dica1 || "-";
    $("d2").textContent = cartaAtual.dica2 || "-";
    $("d3").textContent = cartaAtual.dica3 || "-";

    const erradas = gerarOpcoesErradas(cartaAtual, 3);
    const opcoes = embaralhar([cartaAtual.resposta, ...erradas]);

    $("opts").innerHTML = opcoes.map(op =>
      `<button class="opt" data-op="${op.replace(/"/g, "&quot;")}">${op}</button>`
    ).join("");

    for (const btn of $("opts").querySelectorAll(".opt")) {
      btn.addEventListener("click", () => responder(btn.dataset.op));
    }

    atualizarHUD();
  }

  function responder(op) {
    if (travado) return;
    travado = true;

    const certo = normalizarTexto(op) === normalizarTexto(cartaAtual.resposta);
    const d = obterDificuldadeCarta(cartaAtual);

    if (certo) {
      acertos++;
      pontos += 100 + (d * 20);
      $("fb").innerHTML = `<span class="ok">✅ Correto! Era ${cartaAtual.resposta}</span>`;
    } else {
      erros++;
      $("fb").innerHTML = `<span class="err">❌ Errado. Era ${cartaAtual.resposta}</span>`;
    }

    $("proxBtn").disabled = false;
    atualizarHUD();
  }

  function proxima() {
    if (perguntaAtual >= TOTAL_PERGUNTAS) {
      $("fb").innerHTML = `<strong>Fim!</strong> Pontos: ${pontos} | Acertos: ${acertos} | Erros: ${erros}`;
      $("opts").innerHTML = "";
      $("proxBtn").disabled = true;
      return;
    }
    perguntaAtual++;
    renderPergunta();
  }

  function reiniciar() {
    usadas.clear();
    perguntaAtual = 1;
    pontos = 0;
    acertos = 0;
    erros = 0;
    renderPergunta();
  }

  async function carregar() {
    try {
      const resp = await fetch(`${API}/cartas/personagens`);
      const data = await resp.json();
      cartas = Array.isArray(data?.cartas) ? data.cartas : [];
      if (!cartas.length) throw new Error("Nenhuma carta recebida.");
      renderPergunta();
    } catch (e) {
      $("fb").innerHTML = `<span class="err">Erro ao carregar cartas: ${e.message}</span>`;
    }
  }

  $("proxBtn").addEventListener("click", proxima);
  $("reiniciarBtn").addEventListener("click", reiniciar);

  carregar();
})();
</script>
</body>
</html>
